name: Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分鐘 ping 一次，防止 Render 休眠
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping insurance-advisor-tool
        run: |
          curl -f https://insurance-advisor-tool.onrender.com/health || echo "ping failed, service may be waking up"
